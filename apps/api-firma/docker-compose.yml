services:
  facturaon-api:
    build: .
    container_name: facturaon-api
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - storage_data:/app/tmp/storage
    ports:
      - "3026:3000"
    networks:
      - fon-net
    environment:
      GROVER_NO_SANDBOX: "true"
      GROVER_EXECUTABLE_PATH: /usr/bin/chromium
      PUPPETEER_SKIP_DOWNLOAD: "true"
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      RAILS_ENV: ${RAILS_ENV:-development}
      RAILS_MAX_THREADS: ${RAILS_MAX_THREADS:-5}
      # PostgreSQL local: fon-postgres (apps/db) o remoto vía .env
      DB_HOST: ${DB_HOST:-fon-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      # JWT
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      # Usuario auto-creado al registrar persona autorizada
      PERSONA_AUTORIZADA_DEFAULT_PASSWORD: ${PERSONA_AUTORIZADA_DEFAULT_PASSWORD:-}
      # Correo SMTP (onboarding)
      SMTP_ADDRESS: ${SMTP_ADDRESS:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_DOMAIN: ${SMTP_DOMAIN:-}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_AUTHENTICATION: ${SMTP_AUTHENTICATION:-plain}
      SMTP_ENABLE_STARTTLS: ${SMTP_ENABLE_STARTTLS:-true}
      MAIL_FROM: ${MAIL_FROM:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-FacturaOn Enrolamiento}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      ONBOARDING_TOKEN_EXPIRY_HOURS: ${ONBOARDING_TOKEN_EXPIRY_HOURS:-48}
    env_file:
      - .env
    stdin_open: true
    tty: true
    command: bundle exec rails server -b 0.0.0.0

networks:
  fon-net:
    external: true
    name: fon-net

volumes:
  bundle_cache:
  storage_data:
