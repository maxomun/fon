# PostgreSQL configuration
# La conexión se configura mediante variables de entorno
# Ver archivo .env.example para las variables requeridas

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  # Timeout de conexión en milisegundos
  connect_timeout: 5
  # Variables de conexión desde entorno
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "") %>

development:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "fon23_dev") %>

test:
  <<: *default
  database: <%= ENV.fetch("DB_NAME_TEST", "fon23_test") %>

production:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "fon23_production") %>
  # En producción, también se puede usar DATABASE_URL directamente
  # url: <%= ENV["DATABASE_URL"] %>
