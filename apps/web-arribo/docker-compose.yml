services:
  web-arribo:
    build: .
    container_name: web-arribo
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3026}
    stdin_open: true
    tty: true

volumes:
  node_modules:
